<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Ping RPC</title>
	</head>
	<body>
		<h1>Ping RPC</h1>
		<button id="ping">Ping</button>
		<pre id="output"></pre>

		<script>
			const output = document.getElementById("output");
			
			document.getElementById("ping").addEventListener("click", () => {
				const ws = new WebSocket("ws://localhost:8546/rpc");
				
				ws.onopen = () => {
					ws.send(
					JSON.stringify({
						jsonrpc: "2.0",
						method: "shell_exec",
						params: [
						{
							command: "pixi",
							args: ["run", "ls"],
							},
							],
							id: 1,
							}),
							);
							};
							
							ws.onmessage = (event) => {
								output.textContent = event.data;
								ws.close();
								};
								
								ws.onerror = (event) => {
									output.textContent = "WebSocket error";
									console.error(event);
									};
									});
		</script>
	</body>
</html>
